<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/Picture2.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aethea - Your complete medical companion. Securely manage health records, lab results, medical scans, and doctor consultations in one platform.">
    <meta name="theme-color" content="#0D9488">
    <meta name="color-scheme" content="light">

    <!-- Content Security Policy (dev fallback — prod uses nginx HTTP header) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://static.cloudflareinsights.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:3001 https://aethea.me https://api.aethea.me https://*.supabase.co wss://*.supabase.co https://challenges.cloudflare.com https://cloudflareinsights.com https://maps.googleapis.com https://maps.gstatic.com https://api.aifdrpp.me; frame-src 'self' https://challenges.cloudflare.com https://www.openstreetmap.org; worker-src 'self' blob:;">

    <!-- Preload Cloudflare Turnstile for reliability across devices -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <!-- Preconnect to Google Fonts for faster font loading (LCP optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- DNS prefetch for Supabase -->
    <link rel="dns-prefetch" href="https://supabase.co">
    <link rel="preload" as="image" href="/AetheaLogo.webp" type="image/webp">

    <title>Aethea — Medical Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
