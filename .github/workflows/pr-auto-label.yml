name: PR Auto Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto label by changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Sync status label (draft/ready)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const statusLabels = ['status: in-progress', 'status: needs-review'];
            const labelsToAdd = context.payload.pull_request.draft
              ? ['status: in-progress']
              : ['status: needs-review'];

            const existing = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const existingNames = existing.data.map((label) => label.name);

            const removeTargets = existingNames.filter((name) => statusLabels.includes(name) && !labelsToAdd.includes(name));
            for (const labelName of removeTargets) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: labelName });
            }

            for (const labelName of labelsToAdd) {
              if (!existingNames.includes(labelName)) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [labelName] });
              }
            }

      - name: Sync size label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const linesChanged = (context.payload.pull_request.additions || 0) + (context.payload.pull_request.deletions || 0);

            const sizeLabels = ['size: S', 'size: M', 'size: L', 'size: XL'];
            let target = 'size: S';
            if (linesChanged >= 1000) target = 'size: XL';
            else if (linesChanged >= 200) target = 'size: L';
            else if (linesChanged >= 50) target = 'size: M';

            const existing = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const existingNames = existing.data.map((label) => label.name);

            for (const labelName of sizeLabels) {
              if (labelName !== target && existingNames.includes(labelName)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: labelName });
              }
            }

            if (!existingNames.includes(target)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [target] });
            }

      - name: Infer type label from PR title (fallback)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const title = (context.payload.pull_request.title || '').toLowerCase();

            const typeLabels = [
              'type: feature',
              'type: bug',
              'type: refactor',
              'type: chore',
              'type: documentation'
            ];

            let inferred = null;
            if (/^(feat|feature)(\(|:|\s)/.test(title)) inferred = 'type: feature';
            else if (/^(fix|bug)(\(|:|\s)/.test(title)) inferred = 'type: bug';
            else if (/^(refactor)(\(|:|\s)/.test(title)) inferred = 'type: refactor';
            else if (/^(chore|build|deps|ci)(\(|:|\s)/.test(title)) inferred = 'type: chore';
            else if (/^(docs?|documentation)(\(|:|\s)/.test(title)) inferred = 'type: documentation';

            if (!inferred) return;

            const existing = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const existingNames = existing.data.map((label) => label.name);
            const hasTypeAlready = existingNames.some((name) => typeLabels.includes(name));

            if (!hasTypeAlready) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [inferred] });
            }
